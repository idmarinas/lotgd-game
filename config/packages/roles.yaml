security:
    role_hierarchy:
        ROLE_ADMIN: [ROLE_USER, ROLE_SONATA_ADMIN]

        # Users
        ROLE_EDITOR_USER_EDIT: ROLE_ADMIN
        ROLE_EDITOR_USER_DELETE: ROLE_EDITOR_USER_EDIT
        ROLE_EDITOR_USER_CREATE: ROLE_EDITOR_USER_DELETE
        ROLE_EDITOR_USER_MANAGER: ROLE_EDITOR_USER_CREATE

        # Mounts
        ROLE_EDITOR_MOUNT_EDIT: ROLE_ADMIN
        ROLE_EDITOR_MOUNT_DELETE: ROLE_EDITOR_MOUNT_EDIT
        ROLE_EDITOR_MOUNT_CREATE: ROLE_EDITOR_MOUNT_DELETE
        ROLE_EDITOR_MOUNT_MANAGER: ROLE_EDITOR_MOUNT_CREATE

        # Creatures
        ROLE_EDITOR_CREATURE_EDIT: ROLE_ADMIN
        ROLE_EDITOR_CREATURE_DELETE: ROLE_EDITOR_CREATURE_EDIT
        ROLE_EDITOR_CREATURE_CREATE: ROLE_EDITOR_CREATURE_DELETE
        ROLE_EDITOR_CREATURE_MANAGER: ROLE_EDITOR_CREATURE_CREATE

        # Equipment
        ROLE_EDITOR_EQUIPMENT_EDIT: ROLE_ADMIN
        ROLE_EDITOR_EQUIPMENT_DELETE: ROLE_EDITOR_EQUIPMENT_EDIT
        ROLE_EDITOR_EQUIPMENT_CREATE: ROLE_EDITOR_EQUIPMENT_DELETE
        ROLE_EDITOR_EQUIPMENT_MANAGER: ROLE_EDITOR_EQUIPMENT_CREATE

        # Riddles
        ROLE_EDITOR_RIDDLES_EDIT: ROLE_ADMIN
        ROLE_EDITOR_RIDDLES_DELETE: ROLE_EDITOR_RIDDLES_EDIT
        ROLE_EDITOR_RIDDLES_CREATE: ROLE_EDITOR_RIDDLES_DELETE
        ROLE_EDITOR_RIDDLES_MANAGER: ROLE_EDITOR_RIDDLES_CREATE

        # Config
        ROLE_EDITOR_CONFIG_EDIT: ROLE_ADMIN
        ROLE_EDITOR_CONFIG_DELETE: ROLE_EDITOR_CONFIG_EDIT
        ROLE_EDITOR_CONFIG_CREATE: ROLE_EDITOR_CONFIG_DELETE
        ROLE_EDITOR_CONFIG_MANAGER: ROLE_EDITOR_CONFIG_CREATE

        # Super editor manager
        ROLE_EDITOR_SUPER_MANAGER: [
            ROLE_EDITOR_USER_MANAGER,
            ROLE_EDITOR_MOUNT_MANAGER,
            ROLE_EDITOR_CREATURE_MANAGER,
            ROLE_EDITOR_EQUIPMENT_MANAGER,
            ROLE_EDITOR_RIDDLES_MANAGER,
            ROLE_EDITOR_CONFIG_MANAGER
        ]

        # Sonata ADMIN
        SONATA:
            - ROLE_SONATA_PAGE_ADMIN_PAGE_EDIT

        ROLE_SUPER_ADMIN: [ # Before SU_MEGAUSER
            ROLE_EDITOR_SUPER_MANAGER,
            ROLE_ALLOWED_TO_SWITCH
        ]

        # ####################################

        # editor:
        #     label: Editors
        #     su_is_banmaster: Edit Bans
        # customer:
        #     label: Customer Service
        #     su_is_gamemaster: Can post comments as gamemaster
        #     su_edit_petitions: Handle Petitions
        #     su_edit_comments: Moderate Comments
        #     su_moderate_clans: Moderate Clan Commentary
        #     su_audit_moderation: Audit Moderated Comments
        #     su_override_yom_warning: Do NOT display YOM warning for this person
        #     su_post_motd: Post MoTD's
        # donation:
        #     label: Donations
        #     su_edit_donations: Manage Donations*
        #     su_edit_paylog: Manage Payment Log
        # dev:
        #     label: Game Development
        #     su_infinite_days: Infinite Days*
        #     su_developer: Game Developer* (super powers)
        #     su_debug_output: Debug Output
        #     su_show_phpnotice: See PHP Notices in debug output
        #     su_raw_sql: Execute Raw SQL*
        #     su_view_source: View source code
        #     su_give_grotto: Grotto access (only if not granted implicitly in another permission)
        #     su_never_expire: Account never expires

